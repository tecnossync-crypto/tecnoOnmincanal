name: Deploy → QA

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del deploy manual'
        required: false
        default: 'Deploy manual desde panel'

env:
  IMAGE_BACKEND: ${{ secrets.ECR_REGISTRY }}/tecnossync-backend
  IMAGE_FRONTEND: ${{ secrets.ECR_REGISTRY }}/tecnossync-frontend
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy-qa:
    name: Build & Deploy a QA
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        run: |
          docker build -t $IMAGE_BACKEND:qa-${{ github.sha }} -t $IMAGE_BACKEND:qa ./backend
          docker push $IMAGE_BACKEND:qa-${{ github.sha }}
          docker push $IMAGE_BACKEND:qa

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t $IMAGE_FRONTEND:qa-${{ github.sha }} \
            -t $IMAGE_FRONTEND:qa \
            ./frontend
          docker push $IMAGE_FRONTEND:qa-${{ github.sha }}
          docker push $IMAGE_FRONTEND:qa

      - name: Deploy to QA server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd /opt/tecnossync
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export IMAGE_TAG=qa-${{ github.sha }}
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose -f docker-compose.qa.yml pull backend frontend
            docker compose -f docker-compose.qa.yml up -d --remove-orphans
            docker system prune -f

      - name: Health check QA
        run: |
          sleep 20
          curl -f http://${{ secrets.QA_HOST }}/api/health || exit 1

      - name: Notificar resultado
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ github.sha }}"
          echo "Deploy QA: $STATUS — commit $SHA"
