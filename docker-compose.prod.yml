# docker-compose.prod.yml
# Configuración de producción — usa imágenes de ECR, no build local
# Variables de entorno deben venir del sistema (no .env en producción)

version: '3.9'

services:
  backend:
    image: ${ECR_REGISTRY}/tecnossync-backend:${IMAGE_TAG:-prod}
    container_name: tecnossync_backend
    restart: always
    env_file: /opt/tecnossync/.env.prod
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - /opt/tecnossync/logs:/app/logs
      - /opt/tecnossync/sessions:/app/sessions
      - /opt/tecnossync/uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - tecnossync_net

  frontend:
    image: ${ECR_REGISTRY}/tecnossync-frontend:${IMAGE_TAG:-prod}
    container_name: tecnossync_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/tecnossync/ssl:/etc/nginx/ssl:ro
      - /opt/tecnossync/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - tecnossync_net

networks:
  tecnossync_net:
    driver: bridge
