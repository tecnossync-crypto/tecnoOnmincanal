# docker-compose.qa.yml
# Entorno QA — usa imágenes de ECR pero con postgres y redis locales en el servidor
# No requiere RDS ni ElastiCache (reduce costos en QA)

version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tecnossync_qa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tecnossync_qa
      POSTGRES_USER: tecnossync_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    networks:
      - tecnossync_qa_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tecnossync_admin -d tecnossync_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tecnossync_qa_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - qa_redis_data:/data
    networks:
      - tecnossync_qa_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${ECR_REGISTRY}/tecnossync-backend:${IMAGE_TAG:-qa}
    container_name: tecnossync_qa_backend
    restart: unless-stopped
    env_file: /opt/tecnossync/.env.qa
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tecnossync_qa
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    volumes:
      - /opt/tecnossync-qa/logs:/app/logs
      - /opt/tecnossync-qa/sessions:/app/sessions
      - /opt/tecnossync-qa/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - tecnossync_qa_net

  frontend:
    image: ${ECR_REGISTRY}/tecnossync-frontend:${IMAGE_TAG:-qa}
    container_name: tecnossync_qa_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/tecnossync-qa/nginx-qa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - tecnossync_qa_net

volumes:
  qa_postgres_data:
  qa_redis_data:

networks:
  tecnossync_qa_net:
    driver: bridge
